<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЛеБаович</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00e5ff55;
    border-radius:50%;
    filter:blur(120px);
    top:-150px;
    left:-150px;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#7b2fff66;
    border-radius:50%;
    filter:blur(120px);
    bottom:-150px;
    right:-150px;
}

.card{
    position:relative;
    z-index:2;
    width:360px;
    padding:40px 30px;
    border-radius:30px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    text-align:center;
}

.avatar{
    width:140px;
    height:140px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:5px solid #00e5ff;
    box-shadow:0 0 30px #00e5ff;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    margin-top:25px;
    font-size:34px;
    font-weight:900;
    color:white;
    letter-spacing:3px;
    text-transform:uppercase;
}

p{
    margin:15px 0 35px;
    color:#ddd;
    font-size:15px;
    line-height:1.5;
}

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    height:58px;
    margin:15px 0;
    border-radius:16px;
    font-size:18px;
    font-weight:700;
    color:white;
    transition:.35s;
}

.btn:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.tiktok{
    background:linear-gradient(45deg,#000,#ff0050,#00f2ea);
}

.instagram{
    background:linear-gradient(45deg,#f58529,#feda77,#dd2a7b,#8134af,#515bd4);
}

.telegram{
    background:linear-gradient(45deg,#0088cc,#34b7f1);
}

.youtube{
    background:linear-gradient(45deg,#ff0000,#ff4d4d);
}

.email{
    background:linear-gradient(45deg,#6a11cb,#2575fc);
}

.footer{
    margin-top:25px;
    color:#aaa;
    font-size:13px;
}

</style>
</head>

<body>

<div class="card">

    <div class="avatar">
        <img src="avatar.jpg" alt="Avatar">
    </div>

    <h1>ЛеБаович</h1>

    <p>
        Парень, который снимает жизнь как она есть 🔥<br>
        Обзоры, разговоры, юмор, путешествия,
        ежедневный вайб и немного безумия.<br>
        Creator • Gamer • Blogger 🚀
    </p>


    <a class="btn tiktok" href="https://www.tiktok.com/@toma_s1k" target="_blank">
        🎵 TikTok
    </a>

    <a class="btn instagram" href="https://www.instagram.com/toma_sik" target="_blank">
        📷 Instagram
    </a>

    <a class="btn telegram" href="https://t.me/lezabaoo" target="_blank">
        ✈ Telegram
    </a>

    <a class="btn youtube" href="https://youtube.com/@lebaovich" target="_blank">
        ▶ YouTube
    </a>

    <a class="btn email" href="mailto:happymilk19@gmail.com">
        📩 Сотрудничество
    </a>


    <div class="footer">
        Made with ❤️
    </div>

</div>

</body>
</html>
